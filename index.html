<title>Fiorex Group — Инвестиционная платформа</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'><rect width='36' height='36' rx='4' fill='%233d7979'/><path d='M8 8H28V14H14V16.5H24V22H14V30H8V8Z' fill='white'/></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; font-size: 15px; }

/* Smooth tap highlight on mobile */
button, a, tr { -webkit-tap-highlight-color: transparent; }
input { -webkit-appearance: none; }

/* Responsive table */
table { min-width: 600px; }

/* Mobile-first responsive */
@media (max-width: 768px) {
  body { font-size: 14px; }
  
  /* Metric cards: 2 per row on tablet */
  .metrics-row { gap: 8px !important; }
  .metrics-row > div { min-width: 120px !important; flex: 1 1 calc(50% - 8px) !important; }
  
  /* Smaller headings */
  h1 { font-size: 22px !important; }
  h2 { font-size: 16px !important; }
  
  /* Tighter padding */
  main { padding: 16px 12px !important; }
  
  /* Chart height */
  .chart-container { height: 200px !important; }
}

@media (max-width: 480px) {
  body { font-size: 13px; }
  
  /* Metric cards: stack on small phones */
  .metrics-row > div { flex: 1 1 100% !important; min-width: 0 !important; }
  
  h1 { font-size: 20px !important; }
  
  main { padding: 12px 8px !important; }
  
  /* Smaller table font */
  table { font-size: 12px !important; min-width: 500px; }
  table th { font-size: 10px !important; padding: 8px 4px !important; }
  table td { padding: 6px 4px !important; }
  
  /* Filter buttons */
  .filter-bar button { padding: 6px 10px !important; font-size: 12px !important; }
  
  /* Login form tighter */
  .login-card { padding: 28px 20px !important; }
  
  /* Chart height */
  .chart-container { height: 180px !important; }
  
  /* Header */
  header { height: 48px !important; padding: 0 12px !important; }
  header img { height: 26px !important; }
}

/* Ensure smooth scrolling */
html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

/* Better touch targets */
@media (pointer: coarse) {
  button { min-height: 44px; }
  table tr { min-height: 44px; }
  input { min-height: 44px; }
}
</style>

function fmt(v) {
  return v == null || isNaN(v) ? "\u2014" : Number(v).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtI(v) {
  return v == null || isNaN(v) ? "\u2014" : Number(v).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtD(d) {
  var p = d.split("-");
  return p[2] + "." + p[1] + "." + p[0].slice(2);
}
function fmtPh(raw) {
  var d = raw.replace(/\D/g, "").slice(0, 10);
  var o = "";
  if (d.length > 0) o += "(" + d.slice(0, 3);
  if (d.length >= 3) o += ") ";
  if (d.length > 3) o += d.slice(3, 6);
  if (d.length > 6) o += "-" + d.slice(6, 8);
  if (d.length > 8) o += "-" + d.slice(8, 10);
  return o;
}

function genChart(inv) {
  var start = new Date(inv.startDate);
  var today = new Date("2026-03-08");
  var pts = [];
  var dayMs = 86400000;
  var bal = inv.deposit;
  var cd = inv.deals.filter(function(d) { return d.status === "closed"; }).map(function(d) {
    return Object.assign({}, d, { cd: new Date(d.dateOut) });
  }).sort(function(a, b) { return a.cd - b.cd; });
  var di = 0;
  for (var d = new Date(start); d <= today; d = new Date(d.getTime() + dayMs)) {
    while (di < cd.length && cd[di].cd <= d) { bal += cd[di].pnl; di++; }
    var j = Math.sin(d.getTime() / dayMs * 0.3) * 180 + Math.cos(d.getTime() / dayMs * 0.7) * 120;
    pts.push({
      date: String(d.getDate()).padStart(2, "0") + "." + String(d.getMonth() + 1).padStart(2, "0"),
      fd: new Date(d),
      bal: Math.round((bal + j) * 100) / 100,
    });
  }
  return pts;
}

function PnlCell({ value, isPct }) {
  if (value == null) return <span>{"\u2014"}</span>;
  var pos = value > 0;

  var text = isPct

    : (pos ? "+$" : "\u2212$") + fmt(Math.abs(value));
  return <span style={{ color: color, fontWeight: 600 }}>{text}</span>;
}

      <div className="login-card" style={{ width: "100%", maxWidth: 420, background: C.white, borderRadius: 16, padding: "40px 32px", boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>

        <div>

            <span style={{ padding: "12px 0 12px 14px", fontSize: 16, color: C.gray, fontWeight: 600, whiteSpace: "nowrap" }}>+7 </span>

          <div style={{ position: "relative", marginBottom: 6 }}>
            <input type={showPw ? "text" : "password"} placeholder="Введите пароль" value={pw} onChange={function(e) { setPw(e.target.value); setErr(""); }} onKeyDown={function(e) { if (e.key === "Enter") go(); }}
              style={{ width: "100%", padding: "12px 44px 12px 16px", borderRadius: 8, border: "1.5px solid " + C.gl, fontSize: 16, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
            <button onClick={function() { setShowPw(!showPw); }} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 18, color: C.gray, padding: 4 }}>
              {showPw ? "\u{1F441}" : "\u{1F441}\u200D\u{1F5E8}"}
            </button>
          </div>
          <button onClick={go} style={{ width: "100%", padding: "14px 0", marginTop: 20, border: "none", borderRadius: 8, cursor: "pointer", fontSize: 16, fontWeight: 700, fontFamily: "inherit", background: C.teal, color: "#fff" }}>Войти</button>
        </div>
        {err ? <p style={{ color: C.red, fontSize: 14, textAlign: "center", marginTop: 12, fontWeight: 500 }}>{err}</p> : null}

}

function InvestorPortal({ investorId, onLogout }) {
  var inv = INVESTORS_DB[investorId];
  if (!inv) return <div>Инвестор не найден</div>;
  var pnl = inv.balance - inv.deposit;
  var pp = (pnl / inv.deposit) * 100;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "system-ui, sans-serif" }}>
      <Header onLogout={onLogout} sub="Личный кабинет" />
      <main style={{ padding: "24px 20px", maxWidth: 1200, margin: "0 auto" }}>
        <div style={{ marginBottom: 20 }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, color: C.dark, margin: "4px 0" }}>{inv.name}</h1>
        </div>
        <div className="metrics-row" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 24 }}>
          <MetricCard label="Текущий баланс" value={"$" + fmtI(inv.balance)} />
          <MetricCard label="Свободные средства" value={"$" + fmtI(inv.free)} />
          <MetricCard label="Доходность" value={(pp >= 0 ? "+" : "") + pp.toFixed(2) + "%"} color={pnl >= 0 ? C.green : C.red} sub={(pnl >= 0 ? "+$" : "\u2212$") + fmtI(Math.abs(pnl))} />
        </div>
        <ProfitChart inv={inv} defaultRange="7d" />
        <DealTable deals={inv.deals} defaultFilter="active" />
      </main>
      <footer style={{ textAlign: "center", padding: "24px 20px", color: C.gray, fontSize: 13, borderTop: "1px solid " + C.gl, marginTop: 32 }}>
        <Logo height={22} />
        <p style={{ margin: "8px 0 0" }}>Fiorex Group &copy; 2025 &middot; Инвестируем с мыслью о будущем</p>
      </footer>
    </div>
  );
}

function InvestorDetail({ inv, onBack }) {
  var pnl = inv.balance - inv.deposit;
  var pp = (pnl / inv.deposit) * 100;
  var closed = inv.deals.filter(function(d) { return d.status === "closed"; });
  var wins = closed.filter(function(d) { return d.pnl > 0; }).length;
  var losses = closed.filter(function(d) { return d.pnl < 0; }).length;
  var totalEntryFee = inv.deals.reduce(function(s, d) { return s + (d.entryFee || 0) * 2 / 7; }, 0);
  var totalSuccessFee = inv.deals.reduce(function(s, d) { return s + (d.successFee || 0) * 5 / 25; }, 0);

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: C.teal, fontSize: 14, fontWeight: 600, fontFamily: "inherit", marginBottom: 16, padding: 0 }}>{"\u2190"} Назад</button>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
        <span style={{ padding: "4px 12px", borderRadius: 6, fontSize: 14, fontWeight: 700, background: "rgba(61,121,121,0.1)", color: C.teal }}>{inv.id}</span>
        <h1 style={{ fontSize: 26, fontWeight: 700, color: C.dark, margin: 0 }}>{inv.name}</h1>
      </div>
      <p style={{ fontSize: 14, color: C.gray, marginBottom: 20 }}>Комиссия: {inv.fee} &middot; Тел: +7 {fmtPh(inv.phone)}</p>
      <div className="metrics-row" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 24 }}>
        <MetricCard label="Вложено" value={"$" + fmtI(inv.deposit)} />
        <MetricCard label="Баланс" value={"$" + fmtI(inv.balance)} />
        <MetricCard label="Свободные" value={"$" + fmtI(inv.free)} />
        <MetricCard label="P&L" value={pp.toFixed(2) + "%"} color={pnl >= 0 ? C.green : C.red} sub={(pnl >= 0 ? "+$" : "\u2212$") + fmtI(Math.abs(pnl))} />
        <MetricCard label="Win/Loss" value={wins + "/" + losses} sub={closed.length > 0 ? "WR: " + ((wins / closed.length) * 100).toFixed(0) + "%" : ""} color={C.teal} />
      </div>
      <div className="metrics-row" style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 24 }}>
        <MetricCard label="Entry Fee 2%" value={"$" + fmt(totalEntryFee)} color="#8B5CF6" />
        <MetricCard label="Success Fee 5%" value={"$" + fmt(totalSuccessFee)} color="#8B5CF6" />
      </div>
      <ProfitChart inv={inv} defaultRange="all" />
      <DealTable deals={inv.deals} showFees defaultFilter="all" />
    </div>
  );
}

function App() {
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem("fiorex_session")); } catch(e) {}
  var _r = useState(saved ? saved.role : null); var role = _r[0]; var setRole = _r[1];
  var _i = useState(saved ? saved.iid : null); var iid = _i[0]; var setIid = _i[1];

  function handleLogin(r, id) {
    setRole(r); setIid(id);
    try { localStorage.setItem("fiorex_session", JSON.stringify({ role: r, iid: id })); } catch(e) {}
  }
  function logout() { setRole(null); setIid(null); try { localStorage.removeItem("fiorex_session"); } catch(e) {} }

  if (!role) return <LoginScreen onLogin={handleLogin} />;
  if (role === "investor") return <InvestorPortal investorId={iid} onLogout={logout} />;
  return <AdminPanel onLogout={logout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
